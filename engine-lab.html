<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>엔진 실험실 — 최종판 v14 (로부장)</title>
<style>
body{margin:0;background:#f7f5ef;font-family:Pretendard,-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px}
#wrap{width:min(96vw,1100px);border-radius:18px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.12);background:#fdfcf9;position:relative}
svg{display:block;width:100%;height:auto}
#hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#333;background:rgba(253,252,249,.6);cursor:pointer}
#bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
button{font:inherit;font-weight:700;padding:10px 16px;border-radius:14px;border:2px solid #141414;background:#fff;cursor:pointer}
button.on{background:#3182f6;color:#fff;border-color:#3182f6}
.wd{position:absolute;opacity:0;transform:translate(-50%,-50%) scale(.3);transition:all .45s cubic-bezier(.2,1.6,.4,1);text-align:center;pointer-events:none}
.wd.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.wd .en{font-weight:800;font-size:clamp(22px,3.4vw,44px);color:#141414;text-shadow:0 0 8px #fff,0 0 16px #fff}
.wd .ko{font-weight:700;font-size:clamp(13px,1.6vw,20px);color:#c2410c;text-shadow:0 0 8px #fff}
</style></head><body>
<div id="wrap"><svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg><div id="hint">👆 터치하면 그려집니다</div></div>
<div id="bar">
<button id="replay">다시 그리기</button>
<button class="sp on" data-s="1">속도 1x</button>
<button class="sp" data-s="0.5">속도 0.5x</button>
<button class="sp" data-s="2">속도 2x</button>
<button id="pause">일시정지</button>
<button id="handtg">손 숨기기</button>
</div>
<script>
const NS='http://www.w3.org/2000/svg';
let SPEED=1, HAND=true, state='idle', raf=null, phase=0, simT=0, phaseT=0, last=0, paused=false;
let sc, meta, vw, vh, guides=[], lens=[], durs=[], handEl, blobs=[], wordsEl=[];
let gi=0, gLocal=0, flying=true, hx=0, hy=0, hs=1;
const TOTALDRAW=4600, BLOBMS=2600, HANDSPD=0.38; // 화면폭 비율/초 — 인간 속도
let speechUnlocked=false;
function unlock(){ if(speechUnlocked||!window.speechSynthesis)return;
 const u=new SpeechSynthesisUtterance(' ');u.volume=0;speechSynthesis.speak(u);speechUnlocked=true;}
function bestVoice(){ const v=speechSynthesis.getVoices();
 return v.find(x=>x.lang.startsWith('en')&&x.name.includes('Samantha'))||
        v.find(x=>x.lang.startsWith('en')&&x.name.includes('Google US English'))||
        v.find(x=>x.lang.startsWith('en')&&x.name.includes('Aria'))||
        v.find(x=>x.lang==='en-US'); }
if(window.speechSynthesis) speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
function speak(t){ if(!window.speechSynthesis)return; const u=new SpeechSynthesisUtterance(t);
 u.lang='en-US';u.rate=1.0;u.pitch=1.05;const v=bestVoice();if(v)u.voice=v;speechSynthesis.speak(u);}
const WORDS=[
 {en:'LIGHTHOUSE',ko:'등대',x:.56,y:.14},{en:'LIGHT',ko:'빛',x:.24,y:.09},
 {en:'ROCK',ko:'바위',x:.19,y:.52},{en:'SEA',ko:'바다',x:.70,y:.70}];
Promise.all([
 fetch('/lab-scenes-v3.json?v=22').then(r=>r.json()),
 fetch('/hand-meta.json?v=22').then(r=>r.json())
]).then(([d,m])=>{ sc=d.scenes[0]; meta=m; build(); });
let svg;
function el(n,a,p){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);(p||svg).appendChild(e);return e;}
function build(){
 svg=document.getElementById('svg');
 const vb=sc.vb.split(' ').map(Number); vw=vb[2]; vh=vb[3];
 svg.setAttribute('viewBox',sc.vb);
 const defs=el('defs',{});
 el('rect',{x:0,y:0,width:vw,height:vh,fill:'#fdfcf9'});
 const mL=el('mask',{id:'mL'},defs);
 el('rect',{x:0,y:0,width:vw,height:vh,fill:'black'},mL);
 sc.guides.forEach(g=>{
  guides.push(el('path',{d:g.d,fill:'none',stroke:'white','stroke-width':96,'stroke-linecap':'butt','stroke-linejoin':'round'},mL));
 });
 const mC=el('mask',{id:'mC'},defs);
 el('rect',{x:0,y:0,width:vw,height:vh,fill:'black'},mC);
 const blur=el('filter',{id:'soft'},defs);
 el('feGaussianBlur',{stdDeviation:30},blur);
 const bg=el('g',{filter:'url(#soft)'},mC);
 el('image',{href:sc.img+'?v=22',x:0,y:0,width:vw,height:vh,mask:'url(#mC)',
  style:'filter:saturate(.82) brightness(1.06)'});
 el('image',{href:sc.line+'?v=22',x:0,y:0,width:vw,height:vh,mask:'url(#mL)',
  style:'mix-blend-mode:multiply'});
 // 손
 hs=(vh*0.62)/meta.h;
 handEl=el('image',{href:'/hand.png?v=22',width:meta.w*hs,height:meta.h*hs,
  style:'filter:drop-shadow(-9px 12px 10px rgba(0,0,0,.13))'});
 hx=vw+meta.w*hs; hy=vh+meta.h*hs; setHand(hx,hy);
 // 길이·시간 배분
 let L=0; guides.forEach(p=>{const l=p.getTotalLength();lens.push(l);L+=l;
  p.setAttribute('stroke-dasharray',l+2);p.setAttribute('stroke-dashoffset',l+2);});
 guides.forEach((p,i)=>durs.push(lens[i]/L*TOTALDRAW));
 // 손 항로: 9개 정박점(안내선 중간점 표본) — 손은 이 매끈한 길만 다닌다
 const step=Math.max(1,Math.floor(guides.length/4));
 window.hp=[];
 for(let i=0;i<guides.length;i+=step) hp.push(guides[i].getPointAtLength(lens[i]/2));
 hp.push(guides[guides.length-1].getPointAtLength(lens[guides.length-1]));
 window.hpCum=[0];
 for(let i=1;i<hp.length;i++) hpCum.push(hpCum[i-1]+Math.hypot(hp[i].x-hp[i-1].x,hp[i].y-hp[i-1].y));
 window.hpL=hpCum[hpCum.length-1];
 // 채색 방울: 안내선 중간점 8곳
 for(let i=0;i<8;i++){
  const gI=Math.floor(i/8*guides.length);
  const pt=guides[gI].getPointAtLength(lens[gI]/2);
  blobs.push(el('circle',{cx:pt.x,cy:pt.y,r:0,fill:'white'},bg));
 }
 WORDS.forEach(w=>{
  const d=document.createElement('div');d.className='wd';
  d.style.left=(w.x*100)+'%';d.style.top=(w.y*100)+'%';
  d.innerHTML='<div class="en">'+w.en+'</div><div class="ko">'+w.ko+'</div>';
  document.getElementById('wrap').appendChild(d);wordsEl.push(d);
 });
 document.getElementById('hint').onclick=start;
 document.getElementById('replay').onclick=()=>{reset();start();};
 document.querySelectorAll('.sp').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.sp').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');SPEED=parseFloat(b.dataset.s);});
 document.getElementById('pause').onclick=e=>{ if(state!=='run')return;
  paused=!paused; e.target.textContent=paused?'계속':'일시정지';
  if(paused&&window.speechSynthesis)speechSynthesis.cancel(); };
 document.getElementById('handtg').onclick=e=>{HAND=!HAND;
  handEl.style.display=HAND?'':'none';e.target.textContent=HAND?'손 숨기기':'손 보이기';};
}
function setHand(x,y){ handEl.setAttribute('x',x-meta.tipX*hs); handEl.setAttribute('y',y-meta.tipY*hs); }
function start(){ unlock(); if(state==='run')return;
 document.getElementById('hint').style.display='none';
 state='run'; phase=0; simT=0; phaseT=0; gi=0; gLocal=0; flying=true;
 last=performance.now(); paused=false;
 document.getElementById('pause').textContent='일시정지';
 raf=requestAnimationFrame(tick); }
function reset(){ cancelAnimationFrame(raf); state='idle'; phase=0; simT=0; gi=0; gLocal=0; flying=true; paused=false;
 window.speechSynthesis&&speechSynthesis.cancel();
 guides.forEach((p,i)=>p.setAttribute('stroke-dashoffset',lens[i]+2));
 blobs.forEach(c=>c.setAttribute('r',0));
 wordsEl.forEach(w=>w.classList.remove('show'));
 hx=vw+meta.w*hs; hy=vh+meta.h*hs; setHand(hx,hy); }
function tick(now){
 const dt=Math.min(50,now-last); last=now;
 const d=paused?0:dt*SPEED;
 simT+=d;
 if(phase===0){
  const prog=Math.min(1, simT/TOTALDRAW);
  // 리빌: 전역 시간표
  const target=prog* lens.reduce((a,b)=>a+b,0);
  let acc=0;
  guides.forEach((g,i)=>{
   const local=Math.max(0,Math.min(lens[i],target-acc));
   g.setAttribute('stroke-dashoffset',(lens[i]-local)+(local>=lens[i]?0:2)*0);
   acc+=lens[i];
  });
  // 손: 항로를 등속 스윕 (쓰윽) + 미세 물결
  const hd=prog*hpL;
  let i=0; while(i<hp.length-2 && hpCum[i+1]<=hd) i++;
  const seg=(hd-hpCum[i])/Math.max(1,(hpCum[i+1]-hpCum[i]));
  const tx=hp[i].x+(hp[i+1].x-hp[i].x)*seg;
  const ty=hp[i].y+(hp[i+1].y-hp[i].y)*seg;
  if(d>0){ const wob=Math.sin(simT*0.008)*3;
   hx+=(tx-hx)*0.08; hy+=(ty+wob-hy)*0.08; setHand(hx,hy); }
  if(prog>=1){ phase=1; phaseT=simT; }
 } else if(phase===1){ // 손 퇴장
  if(d>0){ hx+=((vw+meta.w*hs)-hx)*0.1; hy+=((vh+meta.h*hs)-hy)*0.1; setHand(hx,hy); }
  if(simT-phaseT>500){ phase=2; phaseT=simT; }
 } else if(phase===2){ // 물감 방울
  const e2=simT-phaseT;
  blobs.forEach((c,i)=>{
   const s=Math.max(0,Math.min(1,(e2-i*180)/1100));
   c.setAttribute('r',(1-Math.pow(1-s,3))*vw*0.20);
  });
  if(e2>BLOBMS){ phase=3; phaseT=simT; }
 } else if(phase===3){
  const e3=simT-phaseT;
  wordsEl.forEach((w,i)=>{
   if(e3>i*900 && !w.classList.contains('show')){ w.classList.add('show'); speak(WORDS[i].en); }
  });
  if(e3>WORDS.length*900+600){ state='done'; return; }
 }
 raf=requestAnimationFrame(tick);
}
</script></body></html>
