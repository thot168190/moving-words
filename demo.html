<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보는 단어장 — 움직이는 그림사전 챕터 1</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --ink:#1c1c1c; --paper:#fdfcf7; --accent:#ff5a36; --blue:#2f6fed;
    --gray:#444444; --line:#e6e3d8; --gold: #ffd700;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Pretendard Variable', Pretendard, -apple-system, sans-serif; color:var(--ink); background:var(--paper);
    background-size:26px 26px; line-height:1.5;
    display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
    background-image: radial-gradient(var(--line) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  .en{font-family:'Pretendard Variable', Pretendard, -apple-system, sans-serif;}

  /* ---------- 모바일 디바이스 프레임 (데스크톱 대응) ---------- */
  .phone-frame {
    width: 100%;
    max-width: 412px;
    height: 100vh;
    max-height: 840px;
    background: #fff;
    border: 4px solid var(--ink);
    border-radius: 36px;
    box-shadow: 10px 10px 0 var(--ink);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    margin: 20px auto;
  }

  @media (max-width: 480px) {
    .phone-frame {
      border: none;
      border-radius: 0;
      box-shadow: none;
      height: 100vh;
      max-height: none;
      margin: 0;
    }
  }

  /* ---------- 상단바 & 타이틀 ---------- */
  .phone-header {
    height: 60px;
    border-bottom: 3px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--paper);
    font-weight: 800;
    font-size: 18px;
    user-select: none;
    z-index: 10;
  }

  /* ---------- 9:16 세로 카드 스테이지 ---------- */
  .scene-stage {
    flex: 1;
    position: relative;
    background: #fff;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 3px solid var(--ink);
  }
  .scene-stage svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    pointer-events: none;
  }
  .scene-stage .sc-path {
    fill: none;
    stroke: #1a1a1a;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .scene-bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.8s, filter 0.8s, transform 0.8s;
    filter: blur(3px);
    transform: scale(1.015);
    pointer-events: none;
  }
  .scene-bg-img.show {
    opacity: 1;
    filter: blur(0);
    transform: scale(1);
  }
  .scene-cta {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.88);
    transition: opacity .4s;
    z-index: 3;
    text-align: center;
    padding: 20px;
  }
  .scene-cta.hide {
    opacity: 0;
    pointer-events: none;
  }
  .scene-words {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  .sc-word {
    position: absolute;
    opacity: 0;
    transform: translate(-50%, -50%) scale(.3) rotate(-4deg);
  }
  .sc-word.show {
    animation: pop-center .5s cubic-bezier(.2, 1.6, .4, 1) forwards;
  }
  @keyframes pop-center {
    0% { opacity: 0; transform: translate(-50%, calc(-50% + 14px)) rotate(-8deg) scale(.4); }
    100% { opacity: 1; transform: translate(-50%, -50%) rotate(0) scale(1); }
  }
  .sc-word .en {
    font-weight: 900;
    font-size: 26px;
    color: var(--ink);
    line-height: 1.1;
    background: #fff;
    padding: 4px 10px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .sc-word .ko {
    font-size: 14px;
    color: var(--accent);
    font-weight: 800;
    text-align: center;
    margin-top: 2px;
    text-shadow: 0 0 4px #fff, 0 0 8px #fff;
  }

  .pen-overlay {
    position: absolute;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.3s;
    display: none;
  }

  .color-img {
    opacity: 0;
    transition: opacity 0.8s, filter 0.8s, transform 0.8s;
    filter: blur(3px);
    transform: scale(1.015);
  }
  .color-img.active {
    opacity: 0.85;
    filter: blur(0);
    transform: scale(1);
  }

  /* ---------- 하단 내비게이션 & 도감 보관소 ---------- */
  .phone-footer {
    height: 140px;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    position: relative;
    user-select: none;
    z-index: 10;
  }
  .scene-navigation {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }
  .nav-arrow {
    font-size: 20px;
    font-weight: 900;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink);
    padding: 4px 12px;
  }
  .scene-dots {
    display: flex;
    gap: 10px;
  }
  .scene-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    background: #fff;
    cursor: pointer;
    transition: background-color .2s;
  }
  .scene-dot.on {
    background: var(--ink);
  }

  /* ---------- 박물관 미니 전시판 ---------- */
  .museum-shelf {
    display: flex;
    gap: 12px;
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 6px 14px;
    box-shadow: 3px 3px 0 var(--ink);
    width: 90%;
    justify-content: space-around;
  }
  .shelf-slot {
    width: 38px;
    height: 48px;
    border: 2px dashed #b9b5a7;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    position: relative;
    background: #faf9f6;
    color: #b9b5a7;
    transition: all 0.3s ease;
  }
  .shelf-slot.occupied {
    border-style: solid;
    border-color: var(--ink);
    background: #ffe066;
    box-shadow: 2px 2px 0 var(--ink);
    color: var(--ink);
  }
  .shelf-slot.occupied::after {
    content: "🌟";
    font-size: 10px;
    position: absolute;
    top: -4px;
    right: -4px;
  }

  /* ---------- #22 카드 개봉(획득) 3D 연출 ---------- */
  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(20, 20, 20, 0.88);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s cubic-bezier(0.19, 1, 0.22, 1);
  }
  .card-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .card-container {
    width: 240px;
    height: 360px;
    perspective: 1000px;
    margin-bottom: 20px;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
  }
  .card-inner.flipped {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 20px;
    border: 4px solid var(--ink);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
    overflow: hidden;
  }
  .card-front {
    background: var(--paper);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    padding: 16px;
    justify-content: space-between;
    align-items: center;
  }
  .card-front-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border: 3px solid var(--ink);
    border-radius: 12px;
    background: #fff;
  }
  .card-front-title {
    font-size: 24px;
    font-weight: 900;
    color: var(--ink);
    text-align: center;
    margin-top: 8px;
  }
  .card-front-badge {
    background: var(--accent);
    color: #fff;
    font-weight: 800;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 99px;
    border: 2px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
  }
  
  /* 카드 뒷면 (터치 전) */
  .card-back {
    background: linear-gradient(135deg, #1c1c1c 0%, #3a3a3a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 20px;
    text-align: center;
  }
  .card-back-icon {
    font-size: 64px;
    margin-bottom: 14px;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .card-back-text {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }

  /* 황금 반짝임 골드 펄 효과 */
  .card-inner.flipped .card-front {
    box-shadow: 0 0 25px var(--gold);
    border-color: var(--gold);
    animation: goldGlow 2s infinite alternate;
  }
  @keyframes goldGlow {
    0% { box-shadow: 0 0 15px rgba(255,215,0,0.6); }
    100% { box-shadow: 0 0 35px rgba(255,215,0,0.9); }
  }

  /* 골드 파티클 */
  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 101;
  }

  .action-btn {
    font-family: inherit;
    font-size: 16px;
    font-weight: 800;
    padding: 10px 24px;
    border: 3px solid var(--ink);
    border-radius: 12px;
    background: #fff;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform .05s, box-shadow .05s;
  }
  .action-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }
  .action-btn.accent {
    background: var(--accent);
    color: #fff;
  }

  /* ---------- 단어 공방 즉석 생성 페이지 ---------- */
  .workshop-trigger {
    background: var(--ink);
    color: #fff;
    border: 2px solid #fff;
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
  }
  .workshop-overlay {
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.96);
    z-index: 80;
    display: flex;
    flex-direction: column;
    padding: 30px 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .workshop-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .workshop-title {
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 12px;
    text-align: center;
  }
  .workshop-desc {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 20px;
    text-align: center;
    line-height: 1.4;
  }
  .workshop-input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .workshop-input {
    flex: 1;
    padding: 10px 14px;
    border: 3px solid var(--ink);
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    outline: none;
  }
  .workshop-close {
    margin-top: auto;
    align-self: center;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- 상단바 -->
  <div class="phone-header">
    <span style="font-family: inherit; font-size: 16px;">📖 보는 단어장</span>
    <span id="headerChapterName" style="color: var(--accent); font-size: 15px;">바다와 모험</span>
    <div style="display: flex; align-items: center;">
      <!-- 디지털 액자 모드 토글 버튼 추가 -->
      <button class="workshop-trigger" id="ambientBtn" style="margin-right: 6px; background: var(--blue);">액자 🖼️</button>
      <button class="workshop-trigger" id="workshopBtn">공방 🛠️</button>
    </div>
  </div>

  <!-- 메인 9:16 카드 스테이지 -->
  <div class="scene-stage" id="sceneStage">
    <video id="sceneVideo" src="" muted playsinline style="display:none; width:100%; height:100%; object-fit:cover; mix-blend-mode:multiply; filter:brightness(1.07) contrast(1.06);"></video>
    <img id="sceneBgImg" class="scene-bg-img" src="" alt="" />
    
    <!-- R9 마스크 리빌 용 SVG 레이어 -->
    <svg id="sceneSvg" style="display:none; position:absolute; inset:0; width:100%; height:100%;">
      <defs>
        <mask id="lineMask">
          <g id="maskPathsG"></g>
        </mask>
      </defs>
      <image id="colorImg" href="" x="0" y="0" width="100%" height="100%" class="color-img" />
      <image id="lineImg" href="" x="0" y="0" width="100%" height="100%" mask="url(#lineMask)" />
    </svg>
    
    <!-- 실사 손 오버레이 -->
    <div id="penOverlay" class="pen-overlay">
      <img id="handImg" src="/hand.png?v=12" alt="실사 손" style="width: 100%; height: 100%; object-fit: fill;" />
    </div>

    <!-- 단어들이 팝업되는 레이어 -->
    <div class="scene-words" id="sceneWords"></div>
    <div class="scene-cta" id="sceneCta">👆 터치하면 그려집니다</div>

    <!-- #22 카드 개봉(획득) 오버레이 -->
    <div class="card-overlay" id="cardOverlay">
      <div class="card-container">
        <div class="card-inner" id="cardInner">
          <!-- 카드 뒷면 (획득 전) -->
          <div class="card-face card-back">
            <div class="card-back-icon">🎁</div>
            <div class="card-back-text">터치하여 카드 개봉</div>
          </div>
          <!-- 카드 앞면 (획득 후) -->
          <div class="card-face card-front">
            <div class="card-front-badge">박물관 소장 카드</div>
            <img class="card-front-img" id="cardFrontImg" src="" alt="카드 이미지" />
            <div class="card-front-title" id="cardFrontTitle">단어 카드</div>
            <button class="action-btn accent" id="collectBtn" style="width: 90%; margin-top: 10px;">박물관에 보관하기 🏛️</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 단어 공방 즉석 생성 오버레이 -->
    <div class="workshop-overlay" id="workshopOverlay">
      <div class="workshop-title">단어 공방 🛠️</div>
      <div class="workshop-desc">원하는 영어 단어를 입력하면<br>AI가 실시간으로 드로잉을 생성합니다.</div>
      <div class="workshop-input-group">
        <input type="text" class="workshop-input" id="workshopInput" placeholder="단어 입력 (예: lighthouse)" />
        <button class="action-btn accent" id="workshopGenerateBtn">생성 🪄</button>
      </div>
      <button class="action-btn workshop-close" id="workshopCloseBtn">닫기</button>
    </div>
  </div>

  <!-- 하단 컨트롤러 -->
  <div class="phone-footer">
    <div class="scene-navigation">
      <button class="nav-arrow" id="prevBtn">◀</button>
      <div class="scene-dots" id="sceneDots">
        <!-- 동적으로 점들이 생성됨 -->
      </div>
      <button class="nav-arrow" id="nextBtn">▶</button>
    </div>
    
    <!-- 나의 단어 박물관 미니 전시판 -->
    <div class="museum-shelf" id="museumShelf">
      <div class="shelf-slot" id="slot-0" title="장면 1">1</div>
      <div class="shelf-slot" id="slot-1" title="장면 2">2</div>
      <div class="shelf-slot" id="slot-2" title="장면 3">3</div>
      <div class="shelf-slot" id="slot-3" title="장면 4">4</div>
    </div>
  </div>
</div>

<script>
const sceneVideo = document.getElementById('sceneVideo');
const sceneBgImg = document.getElementById('sceneBgImg');
const sceneSvg = document.getElementById('sceneSvg');
const sceneWordsEl = document.getElementById('sceneWords');
const sceneCta = document.getElementById('sceneCta');
const sceneStage = document.getElementById('sceneStage');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const sceneDotsContainer = document.getElementById('sceneDots');
const museumShelfSlots = [
  document.getElementById('slot-0'),
  document.getElementById('slot-1'),
  document.getElementById('slot-2'),
  document.getElementById('slot-3')
];

// #22 카드 획득 연출 셀렉터
const cardOverlay = document.getElementById('cardOverlay');
const cardInner = document.getElementById('cardInner');
const cardFrontImg = document.getElementById('cardFrontImg');
const cardFrontTitle = document.getElementById('cardFrontTitle');
const collectBtn = document.getElementById('collectBtn');

// 단어 공방 셀렉터
const workshopBtn = document.getElementById('workshopBtn');
const workshopOverlay = document.getElementById('workshopOverlay');
const workshopCloseBtn = document.getElementById('workshopCloseBtn');
const workshopGenerateBtn = document.getElementById('workshopGenerateBtn');
const workshopInput = document.getElementById('workshopInput');

// 디지털 액자 버튼
const ambientBtn = document.getElementById('ambientBtn');

let speechUnlocked = false;
let sceneState = 'idle'; // 'idle', 'playing', 'done'
let runToken = 0;
let currentSceneIndex = 0;
let scenesData = null;
let handMeta = null;
let penX = 0;
let penY = 0;
let penRot = 45;
let ambientMode = false; // 디지털 액자 모드 플래그

const penOverlay = document.getElementById('penOverlay');

// LocalStorage 연동: 새로고침해도 박물관 보관 상태가 유지되도록 로드
let museumCollected = [false, false, false, false];
try {
  const saved = localStorage.getItem('museumCollected_ch1');
  if (saved) {
    museumCollected = JSON.parse(saved);
  }
} catch (e) {
  console.error("LocalStorage 로드 실패:", e);
}

// 데이터 가져오기
Promise.all([
  fetch('/scenes-ch1.json?v=12').then(res => res.json()),
  fetch('/hand-meta.json?v=12').then(res => res.json())
]).then(([sceneData, handData]) => {
  scenesData = sceneData.scenes;
  handMeta = handData;
  initDots();
  resetScene();
}).catch(err => {
  console.error("데이터 로드 실패:", err);
  sceneCta.textContent = "로드 실패 (새로고침 해주세요)";
});

function initDots() {
  sceneDotsContainer.innerHTML = '';
  scenesData.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'scene-dot' + (i === currentSceneIndex ? ' on' : '');
    dot.addEventListener('click', (e) => {
      e.stopPropagation();
      changeScene(i);
    });
    sceneDotsContainer.appendChild(dot);
  });
}

function updateDots() {
  const dots = document.querySelectorAll('.scene-dot');
  dots.forEach((dot, i) => {
    if (i === currentSceneIndex) dot.classList.add('on');
    else dot.classList.remove('on');
  });
}

function updateMuseumShelf() {
  museumCollected.forEach((collected, i) => {
    if (collected) museumShelfSlots[i].classList.add('occupied');
    else museumShelfSlots[i].classList.remove('occupied');
  });
  // LocalStorage에 현재 수집 상태 즉시 영구 저장
  try {
    localStorage.setItem('museumCollected_ch1', JSON.stringify(museumCollected));
  } catch (e) {
    console.error("LocalStorage 저장 실패:", e);
  }
}

function changeScene(idx) {
  if (idx < 0 || idx >= scenesData.length) return;
  currentSceneIndex = idx;
  resetScene();
}

function resetScene() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  sceneState = 'idle';
  runToken++;

  // 모든 렌더링 상태 초기화
  sceneVideo.style.opacity = '0';
  sceneVideo.style.display = 'none';
  sceneVideo.currentTime = 0;
  
  sceneBgImg.src = '';
  sceneBgImg.classList.remove('show');
  sceneBgImg.style.display = 'none';
  
  const colorImg = document.getElementById('colorImg');
  const lineImg = document.getElementById('lineImg');
  if (colorImg) {
    colorImg.classList.remove('active');
    colorImg.setAttribute('href', '');
  }
  if (lineImg) {
    lineImg.setAttribute('mask', '');
    lineImg.setAttribute('href', '');
  }
  
  const maskPathsG = document.getElementById('maskPathsG');
  if (maskPathsG) maskPathsG.innerHTML = '';
  
  sceneSvg.style.display = 'none';
  
  if (penOverlay) {
    penOverlay.style.display = 'none';
    penOverlay.style.opacity = '0';
  }
  
  sceneWordsEl.innerHTML = '';
  sceneCta.classList.remove('hide');
  sceneCta.textContent = '👆 터치하면 시작합니다';

  // #22 카드 획득 연출 초기화 (즉각 닫기 처리하여 레이어 간섭 완벽 차단)
  cardOverlay.classList.remove('show');
  cardInner.classList.remove('flipped');

  updateDots();
  updateMuseumShelf();
}

// 모바일용 글로벌 TTS 오디오 잠금 해제
function unlockTTS() {
  if (window.speechSynthesis && !speechUnlocked) {
    const u = new SpeechSynthesisUtterance(' ');
    window.speechSynthesis.speak(u);
    speechUnlocked = true;
    window.removeEventListener('click', unlockTTS);
    window.removeEventListener('touchstart', unlockTTS);
  }
}
window.addEventListener('click', unlockTTS);
window.addEventListener('touchstart', unlockTTS);

function speak(text) {
  if(!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 1.0;
  u.pitch = 1.05;
  window.speechSynthesis.speak(u);
}

// 단어들을 순차적으로 팝업하고 TTS 소리 내기
function triggerWordPopups(words, token) {
  sceneWordsEl.innerHTML = '';
  words.forEach((w, i) => {
    setTimeout(() => {
      if (runToken !== token) return;
      const el = document.createElement('div');
      el.className = 'sc-word show';
      el.style.top = `${w.y * 100}%`;
      el.style.left = `${w.x * 100}%`;
      el.style.pointerEvents = 'auto';
      el.style.cursor = 'pointer';
      el.innerHTML = `<div class="en">${w.en}</div><div class="ko">${w.ko}</div>`;
      
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        speak(w.en);
      });
      el.addEventListener('touchstart', (e) => {
        e.stopPropagation();
        speak(w.en);
      }, {passive: true});

      sceneWordsEl.appendChild(el);
      speak(w.en);
    }, i * 1200);
  });

  // 모든 단어 완료 시 후속 연출 분기
  setTimeout(() => {
    if (runToken !== token) return;
    sceneState = 'done';
    
    // [액자 모드 일 때]
    if (ambientMode) {
      sceneCta.textContent = '액자 자동 감상 모드';
      sceneCta.classList.remove('hide');
      
      // 4초 대기 후 자동으로 다음 씬으로 순환 이동
      setTimeout(() => {
        if (runToken !== token) return;
        let nextIdx = currentSceneIndex + 1;
        if (nextIdx >= scenesData.length) nextIdx = 0;
        changeScene(nextIdx);
        sceneState = 'playing';
        startScene();
      }, 4000);
    } 
    // [일반 학습 모드 일 때] - #22 카드 개봉 연출 등장
    else {
      sceneCta.textContent = '다시 보려면 터치';
      sceneCta.classList.remove('hide');
      
      const currentScene = scenesData[currentSceneIndex];
      cardFrontImg.src = currentScene.poster || '/metric-whale.png';
      cardFrontTitle.textContent = currentScene.words[0].en;
      
      setTimeout(() => {
        cardOverlay.classList.add('show');
      }, 800);
    }
  }, words.length * 1200 + 800);
}

function startScene() {
  const token = runToken;
  sceneCta.classList.add('hide');
  const scene = scenesData[currentSceneIndex];
  
  // 비디오 재생 시도
  sceneVideo.src = scene.video;
  sceneVideo.style.display = 'block';
  sceneVideo.style.opacity = '1';
  
  sceneVideo.play().then(() => {
    // 비디오 재생 성공
    console.log("Playing scene video:", scene.video);
  }).catch(err => {
    // 비디오 로드 에러 (예: mp4 파일이 없을 경우) -> 포스터 이미지 띄우고 즉시 단어 팝업 시퀀스로 우아하게 폴백!
    console.warn("Video play failed, falling back to static poster image:", err);
    sceneVideo.style.display = 'none';
    sceneBgImg.src = scene.poster || '/metric-whale.png';
    sceneBgImg.style.display = 'block';
    sceneBgImg.classList.add('show');
    
    setTimeout(() => {
      if (runToken === token) {
        triggerWordPopups(scene.words, token);
      }
    }, 1200);
  });
}

sceneVideo.addEventListener('ended', () => {
  if (sceneState !== 'playing') return;
  const token = runToken;
  const scene = scenesData[currentSceneIndex];
  triggerWordPopups(scene.words, token);
});

sceneStage.addEventListener('click', () => {
  unlockTTS();
  if (sceneState === 'playing') return;
  
  if (sceneState === 'done') {
    resetScene();
    return;
  }

  sceneState = 'playing';
  startScene();
});

// #22 카드 개봉 인터랙션
cardInner.addEventListener('click', (e) => {
  e.stopPropagation();
  if (cardInner.classList.contains('flipped')) return;
  
  cardInner.classList.add('flipped');
  speak(cardFrontTitle.textContent);
  
  // 골드 축하 파티클 효과
  spawnGoldParticles();
});

function spawnGoldParticles() {
  const rect = cardInner.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  
  for (let i = 0; i < 40; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    document.body.appendChild(particle);
    
    const angle = Math.random() * Math.PI * 2;
    const velocity = 3 + Math.random() * 8;
    const dx = Math.cos(angle) * velocity;
    const dy = Math.sin(angle) * velocity;
    
    let px = centerX;
    let py = centerY;
    particle.style.transform = `translate(${px}px, ${py}px)`;
    
    let life = 0;
    const maxLife = 40 + Math.random() * 30;
    
    function updateParticle() {
      px += dx;
      py += dy + 0.15; // 중력 효과
      life++;
      particle.style.transform = `translate(${px}px, ${py}px)`;
      particle.style.opacity = (1 - life / maxLife);
      
      if (life < maxLife) {
        requestAnimationFrame(updateParticle);
      } else {
        document.body.removeChild(particle);
      }
    }
    requestAnimationFrame(updateParticle);
  }
}

collectBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  
  // 클릭 즉시 show 클래스를 떼내어 레이어 간섭 현상 완전 방지
  cardOverlay.classList.remove('show');
  cardOverlay.style.transition = 'opacity 0.6s ease';
  cardOverlay.style.opacity = '0';

  const targetSlot = museumShelfSlots[currentSceneIndex];
  const slotRect = targetSlot.getBoundingClientRect();
  const cardRect = cardInner.getBoundingClientRect();
  
  cardInner.style.transition = 'all 0.6s cubic-bezier(0.55, 0, 0.1, 1)';
  cardInner.style.transform = `translate(${slotRect.left - cardRect.left}px, ${slotRect.top - cardRect.top}px) scale(0.15)`;
  
  setTimeout(() => {
    museumCollected[currentSceneIndex] = true;
    updateMuseumShelf();
    
    // 모달 상태 물리적 초기화
    cardOverlay.style.opacity = '';
    cardInner.style.transition = '';
    cardInner.style.transform = '';
    
    resetScene();
  }, 600);
});

// 내비게이션 버튼 바인딩
prevBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  let nextIdx = currentSceneIndex - 1;
  if (nextIdx < 0) nextIdx = scenesData.length - 1;
  changeScene(nextIdx);
});

nextBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  let nextIdx = currentSceneIndex + 1;
  if (nextIdx >= scenesData.length) nextIdx = 0;
  changeScene(nextIdx);
});

// 디지털 액자 모드 온오프 제어
ambientBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  ambientMode = !ambientMode;
  
  if (ambientMode) {
    ambientBtn.textContent = "액자 ON 🟢";
    ambientBtn.style.background = "var(--accent)";
    // 켜지는 즉시 자동 재생 가동
    if (sceneState !== 'playing') {
      sceneState = 'playing';
      startScene();
    }
  } else {
    ambientBtn.textContent = "액자 🖼️";
    ambientBtn.style.background = "var(--blue)";
    resetScene();
  }
});

// 단어 공방 즉석 생성 시뮬레이션 로직
workshopBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  // 액자 모드가 켜져있다면 일시 비활성화
  if (ambientMode) {
    ambientMode = false;
    ambientBtn.textContent = "액자 🖼️";
    ambientBtn.style.background = "var(--blue)";
  }
  workshopOverlay.classList.add('show');
});

workshopCloseBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  workshopOverlay.classList.remove('show');
});

// 모의 선화 데이터 (기술 시연을 위한 펜 궤적)
const MOCK_LINEART = [
  {"d": "M 100 150 L 300 150 L 200 350 Z"},
  {"d": "M 150 200 C 180 150 220 150 250 200"},
  {"d": "M 200 100 L 200 400"},
  {"d": "M 100 300 L 300 300"}
];

workshopGenerateBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const word = workshopInput.value.trim().toUpperCase();
  if (!word) {
    alert("공방에 의뢰할 단어를 입력해주세요!");
    return;
  }
  
  workshopOverlay.classList.remove('show');
  resetScene();
  
  sceneCta.textContent = "AI 공방에서 실시간 드로잉 생성 중...";
  sceneCta.classList.remove('hide');
  
  setTimeout(() => {
    sceneCta.classList.add('hide');
    runToken++;
    const token = runToken;
    
    // 모의 드로잉 시작
    simulateWorkshopDrawing(word, token);
  }, 1500);
});

async function simulateWorkshopDrawing(word, token) {
  sceneSvg.style.display = 'block';
  sceneSvg.setAttribute('viewBox', '0 0 1100 613');
  
  const maskPathsG = document.getElementById('maskPathsG');
  maskPathsG.innerHTML = '';
  
  // 마스크 패스 생성
  const svgInkPaths = MOCK_LINEART.map((line) => {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', line.d);
    p.setAttribute('stroke', 'white');
    p.setAttribute('stroke-width', '100');
    p.setAttribute('stroke-linecap', 'round');
    p.setAttribute('stroke-linejoin', 'round');
    p.setAttribute('fill', 'none');
    
    const len = 400; // 가상 길이
    p.style.strokeDasharray = len;
    p.style.strokeDashoffset = len;
    maskPathsG.appendChild(p);
    return { element: p, length: len };
  });

  const lineImg = document.getElementById('lineImg');
  const colorImg = document.getElementById('colorImg');
  // 공방 전용 선화/원화 이미지 Mock 바인딩 (등대용 이미지를 임시 기술 데모로 사용)
  lineImg.setAttribute('href', '/line-lighthouse-v2.png');
  colorImg.setAttribute('href', '/metric-lighthouse.png');
  lineImg.setAttribute('mask', 'url(#lineMask)');

  penOverlay.style.display = 'block';
  penOverlay.style.opacity = '1';
  
  // 손 펜 비행 및 드로잉 모사
  let steps = [
    {x: 200, y: 150},
    {x: 400, y: 300},
    {x: 600, y: 150},
    {x: 500, y: 400}
  ];
  
  for (let i = 0; i < steps.length; i++) {
    await new Promise(resolve => {
      let tStart = null;
      const stepTime = 800;
      const startX = penX;
      const startY = penY;
      const targetX = steps[i].x;
      const targetY = steps[i].y;
      
      function animatePen(ts) {
        if (runToken !== token) { resolve(); return; }
        if (!tStart) tStart = ts;
        const progress = Math.min((ts - tStart) / stepTime, 1);
        
        penX = startX + (targetX - startX) * progress;
        penY = startY + (targetY - startY) * progress;
        
        // 펜 위치 갱신
        const rect = sceneStage.getBoundingClientRect();
        const scaleX = rect.width / 1100;
        const scaleY = rect.height / 613;
        const s = (rect.height * 0.55) / handMeta.h;
        const tx = penX * scaleX - handMeta.tipX * s;
        const ty = penY * scaleY - handMeta.tipY * s;
        
        penOverlay.style.width = `${handMeta.w * s}px`;
        penOverlay.style.height = `${handMeta.h * s}px`;
        penOverlay.style.transform = `translate(${tx}px, ${ty}px)`;
        
        // 마스크 패스 리빌 모사
        if (svgInkPaths[i]) {
          svgInkPaths[i].element.setAttribute('stroke-dashoffset', svgInkPaths[i].length * (1 - progress));
        }
        
        if (progress < 1) requestAnimationFrame(animatePen);
        else resolve();
      }
      requestAnimationFrame(animatePen);
    });
  }
  
  if (runToken !== token) return;
  
  // 채색 완료 처리
  colorImg.classList.add('active');
  penOverlay.style.opacity = '0';
  
  // 완성 단어 팝업 연출
  setTimeout(() => {
    if (runToken !== token) return;
    
    // [공방 버그 1차 수정] 입력 단어의 씬을 매칭 검색하여 보관 대상 인덱스로 지정!
    const matchedIdx = scenesData.findIndex(s => 
      s.words.some(w => w.en.toUpperCase() === word.toUpperCase()) || 
      s.id.toUpperCase() === word.toUpperCase()
    );
    if (matchedIdx !== -1) {
      currentSceneIndex = matchedIdx;
    } else {
      // 매칭되는 게 없으면 빈 박물관 슬롯 중 하나에 임시 할당
      const emptyIdx = museumCollected.findIndex(c => !c);
      if (emptyIdx !== -1) {
        currentSceneIndex = emptyIdx;
      }
    }

    // 공방 임시 획득 단어 팝업
    const mockWord = {en: word, ko: "공방 생성 단어", x: 0.5, y: 0.5};
    const el = document.createElement('div');
    el.className = 'sc-word show';
    el.style.top = `${mockWord.y * 100}%`;
    el.style.left = `${mockWord.x * 100}%`;
    el.innerHTML = `<div class="en">${mockWord.en}</div><div class="ko">${mockWord.ko}</div>`;
    sceneWordsEl.appendChild(el);
    speak(mockWord.en);
    
    sceneState = 'done';
    
    // 카드 획득 연출 작동
    setTimeout(() => {
      // 공방 수집 카드 이미지도 매칭 포스터로 세팅
      cardFrontImg.src = (matchedIdx !== -1 ? scenesData[matchedIdx].poster : '/metric-lighthouse.png');
      cardFrontTitle.textContent = word;
      cardOverlay.classList.add('show');
    }, 1500);
  }, 1000);
}
