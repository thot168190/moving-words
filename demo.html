<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07533f" />
  <title>바로 체험 | 보는 단어장</title>
  <meta name="description" content="그림이 그려지는 과정을 보며 장면 속 영어 단어와 발음을 익혀보세요." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <style>
    :root{--green:#07533f;--green2:#27765b;--mint:#eaf4ef;--line:#d9e6df;--ink:#292d2b;--muted:#68736d;--gold:#b46f00}
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;background:#fff;color:var(--ink);font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:-.02em}
    button,a{font:inherit}
    button{border:0}
    .page{width:min(1180px,calc(100% - 40px));margin:auto}
    .top{height:82px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #edf1ef}
    .brand{display:flex;align-items:center;gap:12px;color:var(--green);font-weight:850;font-size:22px;text-decoration:none}
    .mark{width:27px;height:27px;display:grid;grid-template-columns:1fr 1fr;gap:3px;transform:rotate(45deg)}
    .mark i{display:block;background:var(--green);border-radius:4px}
    .back{color:var(--green);font-weight:750;text-decoration:none;font-size:15px}
    main{padding:68px 0 90px}
    .intro{max-width:800px;margin:0 auto 38px;text-align:center}
    .eyebrow{margin:0 0 12px;color:var(--green2);font-size:14px;font-weight:850;letter-spacing:.16em}
    h1{margin:0;color:var(--green);font-size:clamp(32px,5vw,58px);line-height:1.12;font-weight:900;letter-spacing:-.055em}
    .lead{margin:18px auto 0;color:var(--muted);font-size:clamp(16px,2vw,20px);font-weight:600;line-height:1.6}
    .viewer{display:grid;grid-template-columns:minmax(0,1fr) 290px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    .stage{position:relative;aspect-ratio:16/9;background:#fafcfb;overflow:hidden}
    video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff}
    .word-layer{position:absolute;inset:0;pointer-events:none}
    .word{position:absolute;translate:-50% -50%;padding:0;background:transparent;color:var(--green);text-align:center;cursor:pointer;pointer-events:auto;opacity:0;scale:.88;transition:opacity .45s,scale .45s}
    .word.show{opacity:1;scale:1}
    .word strong{display:block;font-size:clamp(20px,3.2vw,38px);font-weight:900;line-height:1;letter-spacing:-.04em;text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff,0 3px 12px #fff}
    .word span{display:block;margin-top:5px;color:#315f53;font-size:clamp(11px,1.4vw,16px);font-weight:750;text-shadow:0 0 6px #fff,0 0 10px #fff}
    .word:hover strong,.word:focus-visible strong{color:var(--gold)}
    .controls{position:absolute;left:18px;right:18px;bottom:16px;z-index:3;display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:999px;background:rgba(7,45,34,.76);backdrop-filter:blur(8px);color:#fff}
    .play{width:34px;height:34px;border-radius:50%;background:#fff;color:var(--green);cursor:pointer;font-weight:900}
    .progress{height:4px;flex:1;background:rgba(255,255,255,.35);border-radius:9px;overflow:hidden}
    .progress i{display:block;height:100%;width:0;background:#fff;border-radius:inherit}
    .speed{min-width:52px;padding:7px 9px;border-radius:999px;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;font-weight:800}
    .panel{padding:34px 28px;border-left:1px solid var(--line);display:flex;flex-direction:column}
    .count{color:var(--green2);font-size:13px;font-weight:850;letter-spacing:.13em}
    .title{margin:12px 0 10px;color:var(--green);font-size:27px;line-height:1.25;font-weight:900;letter-spacing:-.045em}
    .guide{margin:0;color:var(--muted);font-size:15px;line-height:1.55;font-weight:600}
    .scene-list{margin-top:28px;display:grid;gap:0}
    .scene{padding:17px 0;background:#fff;border-top:1px solid var(--line);text-align:left;color:#7c8881;cursor:pointer;transition:color .2s}
    .scene:last-child{border-bottom:1px solid var(--line)}
    .scene small{display:block;margin-bottom:4px;font-size:11px;font-weight:850;letter-spacing:.14em}
    .scene b{font-size:16px;font-weight:800}
    .scene.active{color:var(--green)}
    .sound-note{margin-top:auto;padding-top:24px;color:var(--green2);font-size:13px;font-weight:700;line-height:1.55}
    .steps{display:grid;grid-template-columns:repeat(3,1fr);margin-top:58px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    .step{padding:26px 24px}
    .step+.step{border-left:1px solid var(--line)}
    .step em{display:block;color:var(--green2);font-size:12px;font-style:normal;font-weight:850;letter-spacing:.14em}
    .step b{display:block;margin-top:8px;color:var(--green);font-size:19px;font-weight:850}
    .cta{display:flex;justify-content:center;margin-top:42px}
    .cta a{padding:15px 26px;border-radius:999px;background:var(--green);color:#fff;text-decoration:none;font-weight:850}
    @media(max-width:820px){
      .page{width:min(100% - 24px,680px)}.top{height:68px}.back{font-size:13px}main{padding:44px 0 64px}.intro{margin-bottom:28px}
      .viewer{display:block}.panel{padding:24px 4px 0;border-left:0;border-top:1px solid var(--line)}.scene-list{margin-top:18px}.sound-note{padding:18px 0 23px}
      .steps{grid-template-columns:1fr;margin-top:42px}.step{padding:20px 4px}.step+.step{border-left:0;border-top:1px solid var(--line)}
    }
    @media(max-width:520px){
      .page{width:100%}.top,.intro,.panel,.steps,.cta{margin-left:18px;margin-right:18px}.brand{font-size:19px}.mark{width:23px;height:23px}.back{font-size:0}.back:after{content:'홈';font-size:13px}
      main{padding-top:38px}.intro{text-align:left}.lead{margin-top:14px}.controls{left:10px;right:10px;bottom:10px;padding:7px 8px}.play{width:30px;height:30px}.speed{min-width:45px;padding:6px}
      .word strong{font-size:clamp(16px,6vw,28px)}.word span{font-size:10px}.panel{padding-left:18px;padding-right:18px;margin:0}.steps{margin-left:18px;margin-right:18px}
    }
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <header class="page top">
    <a class="brand" href="/"><span class="mark" aria-hidden="true"><i></i><i></i><i></i><i></i></span>보는 단어장</a>
    <a class="back" href="/">서비스 소개로 돌아가기</a>
  </header>
  <main class="page">
    <div class="intro">
      <p class="eyebrow">FREE LEARNING PREVIEW</p>
      <h1>그려지는 장면을 보며<br>단어를 익혀보세요.</h1>
      <p class="lead">그림이 완성되면 단어가 나타납니다.<br>단어에 마우스를 올리거나 터치해 발음을 들어보세요.</p>
    </div>
    <section class="viewer" aria-label="무료 학습 장면 체험">
      <div class="stage">
        <video id="video" playsinline muted preload="metadata"></video>
        <div id="words" class="word-layer"></div>
        <div class="controls">
          <button id="play" class="play" type="button" aria-label="재생 또는 일시정지">▶</button>
          <div class="progress" aria-hidden="true"><i id="bar"></i></div>
          <button id="speed" class="speed" type="button" aria-label="재생 속도 변경">1×</button>
        </div>
      </div>
      <aside class="panel">
        <span id="count" class="count">SCENE 01 · 03</span>
        <h2 id="title" class="title"></h2>
        <p class="guide">세 장면을 직접 골라 학습할 수 있습니다.</p>
        <div id="scenes" class="scene-list"></div>
        <p class="sound-note">단어가 보이면 마우스를 올려보세요.<br>모바일에서는 단어를 터치하면 됩니다.</p>
      </aside>
    </section>
    <section class="steps" aria-label="체험 방법">
      <div class="step"><em>01</em><b>그려지는 장면 보기</b></div>
      <div class="step"><em>02</em><b>장면 위 단어 확인하기</b></div>
      <div class="step"><em>03</em><b>발음을 듣고 다시 보기</b></div>
    </section>
    <div class="cta"><a href="/">보는 단어장 더 알아보기</a></div>
  </main>
  <script>
    const scenes=[
      {title:'바람을 타는 범선',src:'/learning-preview/scene-ch1-03.mp4',words:[
        {en:'sail',ko:'돛',x:48,y:31},{en:'horizon',ko:'수평선',x:77,y:25},{en:'voyage',ko:'항해',x:19,y:65},{en:'current',ko:'해류',x:70,y:77}
      ]},
      {title:'밤하늘의 별자리',src:'/learning-preview/scene-ch1-05.mp4',words:[
        {en:'telescope',ko:'망원경',x:31,y:58},{en:'constellation',ko:'별자리',x:59,y:30},{en:'observe',ko:'관찰하다',x:77,y:66},{en:'universe',ko:'우주',x:20,y:23}
      ]},
      {title:'깊은 바다의 산호 협곡',src:'/learning-preview/scene-ch1-08.mp4',words:[
        {en:'coral',ko:'산호',x:18,y:69},{en:'canyon',ko:'협곡',x:52,y:69},{en:'creature',ko:'생물',x:69,y:37},{en:'ecosystem',ko:'생태계',x:80,y:70}
      ]}
    ];
    const video=document.querySelector('#video'),words=document.querySelector('#words'),title=document.querySelector('#title'),count=document.querySelector('#count'),sceneList=document.querySelector('#scenes'),play=document.querySelector('#play'),bar=document.querySelector('#bar'),speed=document.querySelector('#speed');
    let current=0,rateIndex=0,lastSpoken='';const rates=[1,1.5,2];
    function speak(word){
      if(!('speechSynthesis' in window)||lastSpoken===word&&speechSynthesis.speaking)return;
      lastSpoken=word;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=.9;u.pitch=1;
      const voices=speechSynthesis.getVoices();u.voice=voices.find(v=>/Samantha|Ava|Jenny|Aria|Google US English/i.test(v.name))||voices.find(v=>v.lang.startsWith('en'))||null;speechSynthesis.speak(u);
    }
    function renderWords(){
      words.innerHTML='';scenes[current].words.forEach((w,i)=>{const b=document.createElement('button');b.type='button';b.className='word';b.style.left=w.x+'%';b.style.top=w.y+'%';b.innerHTML=`<strong>${w.en}</strong><span>${w.ko}</span>`;b.setAttribute('aria-label',`${w.en}, ${w.ko} 발음 듣기`);b.addEventListener('mouseenter',()=>speak(w.en));b.addEventListener('click',()=>speak(w.en));b.dataset.index=i;words.appendChild(b)});
    }
    function selectScene(index,auto=true){
      current=index;video.src=scenes[index].src;video.playbackRate=rates[rateIndex];title.textContent=scenes[index].title;count.textContent=`SCENE 0${index+1} · 03`;bar.style.width='0';renderWords();renderSceneButtons();if(auto)video.play().catch(()=>{});
    }
    function renderSceneButtons(){
      sceneList.innerHTML='';scenes.forEach((s,i)=>{const b=document.createElement('button');b.type='button';b.className='scene'+(i===current?' active':'');b.innerHTML=`<small>0${i+1}</small><b>${s.title}</b>`;b.addEventListener('click',()=>selectScene(i));sceneList.appendChild(b)});
    }
    video.addEventListener('timeupdate',()=>{const p=video.duration?video.currentTime/video.duration:0;bar.style.width=(p*100)+'%';document.querySelectorAll('.word').forEach((el,i)=>el.classList.toggle('show',p>=.46+i*.09))});
    video.addEventListener('play',()=>play.textContent='Ⅱ');video.addEventListener('pause',()=>play.textContent='▶');video.addEventListener('ended',()=>selectScene((current+1)%scenes.length));
    play.addEventListener('click',()=>video.paused?video.play():video.pause());speed.addEventListener('click',()=>{rateIndex=(rateIndex+1)%rates.length;video.playbackRate=rates[rateIndex];speed.textContent=rates[rateIndex]+'×'});
    selectScene(0,true);
  </script>
</body>
</html>
