<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>콜로세움 동영상 프롬프트 복사</title>
  <style>
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
      background: #F7F4EE;
      color: #242321;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }
    main {
      max-width: 800px;
      margin: 60px auto;
      padding: 0 24px;
    }
    header {
      margin-bottom: 40px;
      border-bottom: 2px solid #242321;
      padding-bottom: 20px;
    }
    h1 {
      font-size: 32px;
      font-weight: 900;
      margin: 0 0 10px 0;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 16px;
      color: #77736C;
      font-weight: 500;
      margin: 0;
    }
    article {
      background: #FFFFFF;
      border: 1px solid #E2DDD5;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.02);
      margin-bottom: 40px;
    }
    .meta-box {
      background: #F7F4EE;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #77736C;
    }
    .meta-box strong {
      color: #242321;
    }
    .head-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    h2 {
      font-size: 20px;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.01em;
    }
    button {
      padding: 12px 24px;
      border: 2px solid #242321;
      border-radius: 12px;
      background: #242321;
      color: #FFFFFF;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
    }
    button:hover {
      background: #FFFFFF;
      color: #242321;
    }
    button.done {
      background: #28a745;
      border-color: #28a745;
      color: #FFFFFF;
    }
    textarea {
      width: 100%;
      min-height: 480px;
      padding: 20px;
      border: 1px solid #E2DDD5;
      border-radius: 12px;
      background: #FAFAFA;
      font-family: ui-monospace, SFMono-Regular, SF Pro Mono, Menlo, Monaco, Consolas, monospace;
      font-size: 14.5px;
      line-height: 1.6;
      color: #333333;
      resize: vertical;
      box-sizing: border-box;
      outline: none;
    }
    textarea:focus {
      border-color: #242321;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>🎥 대문 콜로세움 동영상 프롬프트</h1>
      <p class="subtitle">텍스트 투 비디오(Text-to-Video)로 드로잉 영상을 생성하기 위한 전용 프롬프트입니다.</p>
    </header>

    <article>
      <div class="meta-box">
        📌 <strong>생성 가이드:</strong><br>
        • <strong>생성 방식:</strong> 텍스트 투 비디오 (Text-to-Video)<br>
        • <strong>화면 비율:</strong> 16:9<br>
        • <strong>권장 길이:</strong> 10초<br>
        • <strong>카메라:</strong> 고정 (Fixed Camera)
      </div>

      <div class="head-row">
        <h2>프롬프트 텍스트</h2>
        <button id="copyBtn">복사하기</button>
      </div>

      <textarea id="promptText" readonly>Cinematic whiteboard animation on brilliant pure-white watercolor paper, very bright high-key studio lighting, one continuous locked 16:9 shot. Exactly one realistic right hand holds one fine-tip black archival ink pen.

Opening frame: almost entirely blank pure-white paper. Only the first tiny black stroke exists directly beneath the moving pen tip. The Colosseum is not already present. Every visible architectural line must be physically created behind the pen as the hand moves.

Timing:

0–4 seconds: The hand genuinely constructs a large Roman Colosseum drawing at fast, elegant time-lapse speed. Begin at the lower-right foundation and build the structure progressively across the paper. The pen creates the ground line, curved outer silhouette, three architectural tiers, and rows of arches one arch at a time. Columns, windows, stone blocks, weathered cracks, railings, deep arch interiors, and intricate masonry details appear only after the pen tip passes over each exact location. The unfinished portion remains completely blank white paper until the hand reaches it. The emerging illustration uses thin, precise, deep jet-black fine-liner strokes with strong contrast. By 4 seconds the hand has genuinely completed a museum-quality architectural pen drawing, then moves fully out of frame.

4–8 seconds: The finished black line drawing stays geometrically still. Transparent watercolor blooms one local area at a time. First, warm Roman sandstone gold slowly spreads across selected sunlit arches and upper stone surfaces. Next, restrained amber and terracotta deepen a few shadowed arches and weathered sections. Then pale atmospheric blue softly blooms behind the building, followed by a delicate beige and muted olive wash along the ground. Each pigment spreads gradually through wet paper while large luminous white areas remain visible. The black architectural lines remain dark, crisp, and unchanged above the watercolor.

8–10 seconds: The same single right hand returns and physically writes “ROME” above the Colosseum in clean bold deep-black uppercase letters, forming R, O, M, E one letter at a time. The hand exits. Hold briefly on the completed refined illustration.

Final visual quality: sophisticated museum-grade architectural pen-and-watercolor artwork, highly accurate Roman Colosseum proportions, exceptionally dense fine-line detail, dimensional stone texture, refined light and shadow, transparent watercolor, controlled warm sandstone color, restrained pale blue atmosphere, bright pure-white paper, elegant and premium.

Continuity: the building grows only from the active pen tip; the unfinished region stays blank; one right hand, one pen, fixed camera, one uninterrupted shot, progressive physical drawing, area-by-area watercolor bloom, and only the word “ROME” inside the generated video.</textarea>
    </article>
  </main>

  <script>
    const copyBtn = document.getElementById('copyBtn');
    const promptText = document.getElementById('promptText');

    copyBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(promptText.value);
        copyBtn.textContent = '복사 완료 ✓';
        copyBtn.classList.add('done');
        setTimeout(() => {
          copyBtn.textContent = '복사하기';
          copyBtn.classList.remove('done');
        }, 1500);
      } catch (err) {
        alert('복사에 실패했습니다. 직접 선택해서 복사해 주세요.');
      }
    };
  </script>
</body>
</html>
