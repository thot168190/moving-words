<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>결제 중단 — 보는 단어장</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#fffdf8;color:#171512;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(560px,100%);padding:46px 34px;border:1px solid #e8e0d2;border-radius:24px;background:#fff;text-align:center;box-shadow:0 18px 60px rgba(60,45,25,.08)}.mark{display:grid;place-items:center;width:58px;height:58px;margin:0 auto 22px;border-radius:50%;background:#fff1ee;color:#b54330;font-size:28px}h1{font-size:28px;margin:0 0 14px}p{color:#6b6257;line-height:1.75;margin:0}.reason{margin-top:20px;padding:14px;border-radius:14px;background:#f7f4ee;font-size:14px}a{display:inline-block;margin-top:24px;padding:15px 24px;border-radius:14px;background:#171512;color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">×</div>
    <h1>결제가 완료되지 않았습니다.</h1>
    <p>취소했거나 결제수단 인증 중 문제가 발생했습니다.<br />금액은 청구되지 않았습니다.</p>
    <div class="reason" id="reason">다시 시도해 주세요.</div>
    <a href="/#course">결제 화면으로 돌아가기</a>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const message = params.get('message');
    if (message) document.getElementById('reason').textContent = message;
  </script>
</body>
</html>
