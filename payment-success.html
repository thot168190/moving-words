<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>결제 인증 완료 — 보는 단어장</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#fffdf8;color:#171512;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(560px,100%);padding:46px 34px;border:1px solid #e8e0d2;border-radius:24px;background:#fff;text-align:center;box-shadow:0 18px 60px rgba(60,45,25,.08)}.mark{display:grid;place-items:center;width:58px;height:58px;margin:0 auto 22px;border-radius:50%;background:#eef8f0;color:#267a43;font-size:30px}h1{font-size:28px;margin:0 0 14px}p{color:#6b6257;line-height:1.75;margin:0 0 24px}.notice{padding:15px;border-radius:14px;background:#fff7e8;color:#805c1f;font-size:14px}a{display:inline-block;margin-top:24px;padding:15px 24px;border-radius:14px;background:#171512;color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">✓</div>
    <h1>결제 인증을 마쳤습니다.</h1>
    <p>토스 결제창에서 인증이 완료되었습니다.<br />현재는 테스트 단계이므로 실제 금액은 청구되지 않습니다.</p>
    <div class="notice">실서비스에서는 서버의 결제 승인과 구매 권한 저장이 완료된 뒤 학습 홈이 열립니다.</div>
    <a href="/">보는 단어장으로 돌아가기</a>
  </main>
</body>
</html>
